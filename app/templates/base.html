<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardlinker</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>
        // Dark mode: runs before any external scripts to prevent white flash.
        // Check localStorage, then system preference, default to dark.
        (function() {
            var stored = localStorage.getItem('theme');
            if (stored === 'light') return;
            if (stored === 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches || !stored) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        /* Default to dark background to prevent flash before Tailwind loads */
        html.dark { background-color: #111827; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse-bar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .pulse-bar { animation: pulse-bar 1.5s ease-in-out infinite; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 transition-colors">
    <div class="min-h-full">
        <nav class="bg-indigo-600 dark:bg-indigo-900">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-3">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                        </svg>
                        <h1 class="text-white text-xl font-bold">Hardlinker</h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-indigo-200 text-sm hidden sm:block">Duplicate File Deduplication</span>
                        <button id="theme-toggle" type="button"
                            class="p-2 rounded-lg text-indigo-200 hover:text-white hover:bg-indigo-500 dark:hover:bg-indigo-800 transition-colors"
                            title="Toggle dark mode">
                            <!-- Sun icon (shown in dark mode) -->
                            <svg id="icon-sun" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
                            </svg>
                            <!-- Moon icon (shown in light mode) -->
                            <svg id="icon-moon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Dark mode toggle
        const toggle = document.getElementById('theme-toggle');
        const iconSun = document.getElementById('icon-sun');
        const iconMoon = document.getElementById('icon-moon');

        function updateIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            iconSun.classList.toggle('hidden', !isDark);
            iconMoon.classList.toggle('hidden', isDark);
        }
        updateIcons();

        toggle.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcons();
        });
    </script>
</body>
</html>
